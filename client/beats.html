<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">
    
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    
    <title>
    Browse Beats | Moxxie Beats
    </title>
    
    <link rel="stylesheet" href="assets/css/styles.css">
    
    </head>


<body>


<header>

    <h2 class="brand-title">

        MOXXIE BEATS
    
    </h2>

    <a href="index.html" class="cart-btn">
        Home
    </a>

    <a href="cart.html" class="cart-btn">

        🛒 Cart
    
        <span id="cart-count">
            0
        </span>
    
    </a>

</header>


<main>

    <section class="beats-page">
    
        <div class="browse-container">
    
    
            <section class="browse-hero">
    
                <div class="browse-hero-content">
    
                    <h1>
                        🎵 Browse Beats
                    </h1>
    
                    <p>
                        Discover premium beats produced by Moxxie Digital.
    
                        Find the perfect instrumental for your next hit.
                        Search by genre, mood, BPM, key or artist.
                    </p>
    
                </div>
    
            </section>
    
    
    
            <div class="search-wrapper">
    
                <span class="search-icon">
    
            <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none">
        
                <circle
                    cx="11"
                    cy="11"
                    r="7"
                    stroke="currentColor"
                    stroke-width="2"/>
        
                <path
                    d="M20 20L17 17"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"/>
        
            </svg>
    
                </span>
    
    
                <input
                    id="search"
                    type="text"
                    placeholder="Search beats, artists or genres...">
    
            </div>
    
    
    
            <div class="browse-info">
    
                <span id="results-count">
    
                    🎵 Showing 0 premium beats
    
                </span>
    
            </div>
    
    
    
            <div id="beats-container"></div>
    
    
        </div>
    
    </section>


</main>


<script src="assets/js/cart-utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<script src="assets/js/components.js"></script>

<script src="assets/js/player.js"></script>

<script src="assets/js/beats.js"></script>
<script src="assets/js/cart.js"></script>


</body>

</html>
