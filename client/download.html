<!DOCTYPE html>
<html>
<head>

<title>Your Downloads</title>

<link rel="stylesheet" href="assets/css/styles.css">

</head>

<body>

<header>

<h1>Your Beats</h1>

</header>


<div id="downloads"></div>


<script>

const token =
window.location.pathname.split("/").pop();


fetch(
`http://localhost:5000/api/download/${token}`
)

.then(res=>res.json())

.then(data=>{


const box =
document.getElementById("downloads");


data.downloads.forEach(beat=>{


box.innerHTML += `

<div class="beat-card">

<h2>
${beat.title}
</h2>


<a href="${beat.url}" download>
Download MP3
</a>


</div>

`;


});


});


</script>


</body>
</html>
