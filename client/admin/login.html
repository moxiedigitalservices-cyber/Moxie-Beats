<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0">

    <title>Moxxie Digital Admin Login</title>


    <link rel="stylesheet" href="./assets/css/admin.css">


</head>


<body class="login-page">


<div class="login-card">


    <h1>
        Moxxie Digital
    </h1>


    <p>
        Admin Dashboard Login
    </p>



    <form id="login-form">


        <input
        type="text"
        id="username"
        placeholder="Username"
        required>



        <input
        type="password"
        id="password"
        placeholder="Password"
        required>



        <button 
        type="submit"
        class="primary-btn">

            Login

        </button>


    </form>



    <p 
    id="login-message">
    </p>


</div>



<script src="./assets/js/login.js"></script>


</body>

</html>
